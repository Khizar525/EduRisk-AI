<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#14b8a6"/>
      <stop offset="100%" style="stop-color:#38bdf8"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Decorative grid dots -->
  <g opacity="0.05" fill="#14b8a6">
    <circle cx="100" cy="100" r="2"/><circle cx="150" cy="100" r="2"/><circle cx="200" cy="100" r="2"/>
    <circle cx="100" cy="150" r="2"/><circle cx="150" cy="150" r="2"/><circle cx="200" cy="150" r="2"/>
    <circle cx="100" cy="200" r="2"/><circle cx="150" cy="200" r="2"/><circle cx="200" cy="200" r="2"/>
    <circle cx="1000" cy="400" r="2"/><circle cx="1050" cy="400" r="2"/><circle cx="1100" cy="400" r="2"/>
    <circle cx="1000" cy="450" r="2"/><circle cx="1050" cy="450" r="2"/><circle cx="1100" cy="450" r="2"/>
    <circle cx="1000" cy="500" r="2"/><circle cx="1050" cy="500" r="2"/><circle cx="1100" cy="500" r="2"/>
  </g>
  
  <!-- Accent line -->
  <rect x="80" y="200" width="80" height="4" rx="2" fill="url(#accent)"/>
  
  <!-- Title -->
  <text x="80" y="260" font-family="Inter, system-ui, sans-serif" font-size="72" font-weight="800" fill="#e5e7eb">
    EduRisk<tspan fill="#14b8a6"> AI</tspan>
  </text>
  
  <!-- Subtitle -->
  <text x="80" y="310" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="400" fill="#9ca3af">
    Explainable Machine Learning for Academic Risk Prediction
  </text>
  
  <!-- Stats -->
  <g font-family="Inter, system-ui, sans-serif">
    <!-- Stat 1 -->
    <text x="80" y="400" font-size="48" font-weight="800" fill="#14b8a6">85.58%</text>
    <text x="80" y="430" font-size="16" fill="#6b7280">Accuracy</text>
    
    <!-- Stat 2 -->
    <text x="320" y="400" font-size="48" font-weight="800" fill="#38bdf8">94.92%</text>
    <text x="320" y="430" font-size="16" fill="#6b7280">ROC-AUC</text>
    
    <!-- Stat 3 -->
    <text x="580" y="400" font-size="48" font-weight="800" fill="#22c55e">62</text>
    <text x="580" y="430" font-size="16" fill="#6b7280">Tests</text>
    
    <!-- Stat 4 -->
    <text x="760" y="400" font-size="48" font-weight="800" fill="#f59e0b">4</text>
    <text x="760" y="430" font-size="16" fill="#6b7280">Models</text>
  </g>
  
  <!-- Tech stack pills -->
  <g font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600">
    <rect x="80" y="480" width="90" height="32" rx="16" fill="#1f2937"/>
    <text x="125" y="501" text-anchor="middle" fill="#e5e7eb">Python</text>
    
    <rect x="190" y="480" width="110" height="32" rx="16" fill="#1f2937"/>
    <text x="245" y="501" text-anchor="middle" fill="#e5e7eb">FastAPI</text>
    
    <rect x="320" y="480" width="100" height="32" rx="16" fill="#1f2937"/>
    <text x="370" y="501" text-anchor="middle" fill="#e5e7eb">Next.js</text>
    
    <rect x="440" y="480" width="80" height="32" rx="16" fill="#1f2937"/>
    <text x="480" y="501" text-anchor="middle" fill="#e5e7eb">SHAP</text>
    
    <rect x="540" y="480" width="120" height="32" rx="16" fill="#1f2937"/>
    <text x="600" y="501" text-anchor="middle" fill="#e5e7eb">Scikit-learn</text>
    
    <rect x="680" y="480" width="90" height="32" rx="16" fill="#1f2937"/>
    <text x="725" y="501" text-anchor="middle" fill="#e5e7eb">XGBoost</text>
  </g>
  
  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="#111827"/>
  <text x="80" y="616" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6b7280">
    github.com/Khizar525/edurisk-ai
  </text>
  <text x="1120" y="616" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6b7280" text-anchor="end">
    MIT License
  </text>
</svg>
